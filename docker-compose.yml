services:
  redis:
    image: redis:7-alpine
    container_name: foodveryweb-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      # Enable BuildKit for cache mounts
      args:
        BUILDKIT_INLINE_CACHE: 1
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-200}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "4"

  daily-restart:
    image: docker:27-cli
    entrypoint: ["/bin/sh", "/scripts/daily-restart.sh"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.docker/scripts/daily-restart.sh:/scripts/daily-restart.sh:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:rw
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-foodveryweb}
      RESTART_TARGET_SERVICE: ${RESTART_TARGET_SERVICE:-app}
      RESTART_INTERVAL_SECONDS: ${RESTART_INTERVAL_SECONDS:-86400}
      RESTART_CONTAINER_NAME: ${RESTART_CONTAINER_NAME:-}
      TRUNCATE_CONTAINER_LOGS: ${TRUNCATE_CONTAINER_LOGS:-1}
    depends_on:
      - app
    restart: unless-stopped
